<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Wishlist — ShopEase</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { theme: { extend: {
      colors: { primary: { 50:'#EFF6FF',600:'#2563EB',700:'#1D4ED8' }, accent: { 500:'#F59E0B',600:'#D97706' } },
      fontFamily: { sans: ['Inter','system-ui','-apple-system','Segoe UI','Roboto','sans-serif'] },
    } } };
  </script>
</head>

<body class="font-sans bg-white text-gray-600 antialiased">
  <a href="#main" class="sr-only focus:not-sr-only focus:absolute focus:z-[100] focus:top-3 focus:left-3 focus:bg-white focus:text-gray-900 focus:px-4 focus:py-2 focus:rounded-lg focus:ring-2 focus:ring-primary-600">Skip to content</a>

  <!-- ============================ HEADER ============================ -->
  <header class="sticky top-0 z-50 border-b border-gray-200 bg-white/95 backdrop-blur">
    <div class="mx-auto max-w-7xl px-4 sm:px-6 lg:px-8">
      <div class="flex h-16 items-center justify-between gap-4">
        <a href="index.html" class="flex items-center gap-2" aria-label="ShopEase home">
          <span class="inline-flex h-9 w-9 items-center justify-center rounded-lg bg-primary-600 text-white"><svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"/></svg></span>
          <span class="text-xl font-bold text-gray-900">Shop<span class="text-primary-600">Ease</span></span>
        </a>
        <nav class="hidden lg:flex items-center gap-1" aria-label="Primary">
          <a href="index.html" class="rounded-lg px-3 py-2 text-sm font-medium text-gray-600 hover:bg-gray-100 hover:text-gray-900 transition">Home</a>
          <a href="shop.html" class="rounded-lg px-3 py-2 text-sm font-medium text-gray-600 hover:bg-gray-100 hover:text-gray-900 transition">Shop</a>
          <a href="index.html#categories" class="rounded-lg px-3 py-2 text-sm font-medium text-gray-600 hover:bg-gray-100 hover:text-gray-900 transition">Categories</a>
        </nav>
        <div class="flex items-center gap-1">
          <a href="#" aria-label="Account" class="hidden sm:inline-flex h-11 w-11 items-center justify-center rounded-lg text-gray-700 hover:bg-gray-100 focus:outline-none focus:ring-2 focus:ring-primary-600"><svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg></a>
          <a href="wishlist.html" aria-label="Wishlist" class="relative inline-flex h-11 w-11 items-center justify-center rounded-lg text-red-600 bg-red-50 focus:outline-none focus:ring-2 focus:ring-primary-600"><svg class="h-6 w-6" fill="currentColor" viewBox="0 0 24 24"><path d="M11.645 20.91l-.007-.003-.022-.012a15.247 15.247 0 01-.383-.218 25.18 25.18 0 01-4.244-3.17C4.688 15.36 2.25 12.174 2.25 8.25 2.25 5.322 4.714 3 7.688 3A5.5 5.5 0 0112 5.052 5.5 5.5 0 0116.313 3c2.973 0 5.437 2.322 5.437 5.25 0 3.925-2.438 7.111-4.739 9.256a25.175 25.175 0 01-4.244 3.17 15.247 15.247 0 01-.383.219l-.022.012-.007.004-.003.001a.752.752 0 01-.704 0l-.003-.001z"/></svg><span id="wishCount" class="absolute -top-0.5 -right-0.5 inline-flex h-5 min-w-[1.25rem] items-center justify-center rounded-full bg-accent-500 px-1 text-xs font-semibold text-white">0</span></a>
          <a href="cart.html" aria-label="Cart" class="relative inline-flex h-11 w-11 items-center justify-center rounded-lg text-gray-700 hover:bg-gray-100 focus:outline-none focus:ring-2 focus:ring-primary-600"><svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"/></svg><span id="cartCount" class="absolute -top-0.5 -right-0.5 inline-flex h-5 min-w-[1.25rem] items-center justify-center rounded-full bg-accent-500 px-1 text-xs font-semibold text-white">3</span></a>
        </div>
      </div>
    </div>
  </header>

  <main id="main" class="mx-auto max-w-7xl px-4 sm:px-6 lg:px-8 py-6 md:py-10">
    <nav aria-label="Breadcrumb" class="mb-4">
      <ol class="flex flex-wrap items-center gap-1.5 text-sm text-gray-500">
        <li><a href="index.html" class="hover:text-primary-600">Home</a></li>
        <li aria-hidden="true" class="text-gray-300">/</li>
        <li aria-current="page" class="font-medium text-gray-900">Wishlist</li>
      </ol>
    </nav>

    <!-- Header row -->
    <div id="wishHeader" class="mb-6 flex flex-wrap items-center justify-between gap-3">
      <div>
        <h1 class="text-2xl font-bold text-gray-900 md:text-3xl">My Wishlist</h1>
        <p class="mt-1 text-sm text-gray-500"><span id="wishItemCount">0</span> items saved</p>
      </div>
      <div class="flex items-center gap-2">
        <button id="clearWishlist" type="button" class="rounded-lg border border-gray-300 px-4 py-2.5 text-sm font-medium text-gray-700 hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-primary-600 transition">Clear all</button>
        <button id="addAllToCart" type="button" class="inline-flex items-center gap-1.5 rounded-lg bg-primary-600 px-4 py-2.5 text-sm font-semibold text-white hover:bg-primary-700 focus:outline-none focus:ring-2 focus:ring-primary-600 transition">
          <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"/></svg>
          Add all to cart
        </button>
      </div>
    </div>

    <!-- Grid -->
    <div id="wishGrid" class="grid grid-cols-2 gap-4 sm:grid-cols-3 md:gap-6 lg:grid-cols-4"></div>

    <!-- Empty state -->
    <div id="wishEmpty" class="hidden py-16 text-center">
      <div class="mx-auto mb-4 flex h-20 w-20 items-center justify-center rounded-full bg-red-50 text-red-400">
        <svg class="h-10 w-10" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"/></svg>
      </div>
      <h2 class="text-lg font-semibold text-gray-900">Your wishlist is empty</h2>
      <p class="mt-1 text-sm text-gray-500">Tap the heart on any product to save it here for later.</p>
      <a href="shop.html" class="mt-5 inline-block rounded-lg bg-primary-600 px-6 py-2.5 text-sm font-semibold text-white hover:bg-primary-700 transition">Browse Products</a>
    </div>
  </main>

  <!-- ============================ FOOTER ============================ -->
  <footer class="bg-gray-900 text-gray-300">
    <div class="mx-auto max-w-7xl px-4 sm:px-6 lg:px-8 py-10">
      <div class="flex flex-col items-center justify-between gap-4 sm:flex-row">
        <a href="index.html" class="flex items-center gap-2"><span class="inline-flex h-9 w-9 items-center justify-center rounded-lg bg-primary-600 text-white"><svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"/></svg></span><span class="text-xl font-bold text-white">Shop<span class="text-primary-600">Ease</span></span></a>
        <p class="text-xs text-gray-400">© <span id="year"></span> ShopEase. Cash on Delivery &amp; SSLCommerz accepted.</p>
      </div>
    </div>
  </footer>

  <!-- Toast -->
  <div id="toast" class="pointer-events-none fixed right-4 top-20 z-[60] translate-y-2 rounded-lg bg-gray-900 px-4 py-3 text-sm font-medium text-white opacity-0 shadow-lg transition-all duration-300"></div>

  <script>
    const taka = (n) => '৳ ' + Number(n).toLocaleString('en-BD');
    function starsSvg(rating) {
      const full = Math.round(rating); let out = '';
      for (let i = 0; i < 5; i++) out += `<svg class="h-3.5 w-3.5 ${i < full ? 'text-accent-500' : 'text-gray-300'}" fill="currentColor" viewBox="0 0 20 20"><path d="M9.05 2.927c.3-.921 1.6-.921 1.9 0l1.286 3.957a1 1 0 00.95.69h4.162c.969 0 1.371 1.24.588 1.81l-3.368 2.447a1 1 0 00-.364 1.118l1.287 3.957c.3.922-.755 1.688-1.539 1.118l-3.366-2.447a1 1 0 00-1.176 0l-3.366 2.447c-.783.57-1.838-.196-1.539-1.118l1.287-3.957a1 1 0 00-.364-1.118L2.354 9.384c-.783-.57-.38-1.81.588-1.81h4.162a1 1 0 00.951-.69l1.286-3.957z"/></svg>`;
      return out;
    }

    /* ---------- Wishlist items (standalone demo data) ---------- */
    let wishlist = [
      { name: 'Wireless Noise-Cancelling Headphones', price: 6499, oldPrice: 8999, img: 'photo-1505740420928-5e560c06d30e', rating: 4.8, reviews: 214, inStock: true },
      { name: 'Smart Fitness Watch Series 6', price: 4299, img: 'photo-1523275335684-37898b6baf30', rating: 4.6, reviews: 167, inStock: true },
      { name: 'Premium Sunglasses UV400', price: 1599, img: 'photo-1572635196237-14b3f281503f', rating: 4.5, reviews: 98, inStock: false },
      { name: 'Mechanical Keyboard RGB', price: 5499, oldPrice: 6299, img: 'photo-1587829741301-dc798b83add3', rating: 4.7, reviews: 36, inStock: true },
      { name: 'Ceramic Pour-Over Coffee Set', price: 1899, img: 'photo-1495774856032-8b90bbb32b32', rating: 4.9, reviews: 23, inStock: true },
    ];

    let cartCount = 3;

    function card(p, idx) {
      const imgUrl = `https://images.unsplash.com/${p.img}?auto=format&fit=crop&w=600&q=70`;
      const stockBadge = p.inStock
        ? '<span class="bg-green-50 text-green-700 text-xs font-medium px-2.5 py-1 rounded-full shadow-sm">In Stock</span>'
        : '';
      const oldPrice = p.oldPrice ? `<span class="text-xs text-gray-400 line-through">${taka(p.oldPrice)}</span>` : '';
      const addBtn = p.inStock
        ? `<button type="button" data-action="add" data-idx="${idx}" class="inline-flex w-full items-center justify-center gap-1.5 rounded-lg bg-primary-600 px-3 py-2.5 text-sm font-semibold text-white hover:bg-primary-700 focus:outline-none focus:ring-2 focus:ring-primary-600 transition">
             <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"/></svg> Add to Cart
           </button>`
        : `<button type="button" disabled aria-disabled="true" class="w-full cursor-not-allowed rounded-lg bg-gray-200 px-3 py-2.5 text-sm font-semibold text-gray-400">Stock Out</button>`;

      return `
        <article class="group flex flex-col overflow-hidden rounded-xl border border-gray-200 bg-white transition duration-300 ease-out hover:-translate-y-1 hover:border-primary-600 hover:shadow-xl">
          <div class="relative aspect-square overflow-hidden bg-gray-100">
            <a href="product-details.html" aria-label="View ${p.name}" class="block h-full w-full">
              <img src="${imgUrl}" alt="${p.name}" loading="lazy" class="h-full w-full object-cover transition duration-500 ease-out group-hover:scale-110 ${p.inStock ? '' : 'grayscale'}" />
            </a>
            ${p.inStock ? '' : '<div class="pointer-events-none absolute inset-0 flex items-center justify-center bg-white/30"><span class="rounded-md bg-gray-900/85 px-4 py-1.5 text-xs font-semibold uppercase tracking-wide text-white shadow-md">Stock Out</span></div>'}
            <div class="absolute left-2 top-2">${stockBadge}</div>
            <button type="button" data-action="remove" data-idx="${idx}" aria-label="Remove ${p.name} from wishlist" class="absolute right-2 top-2 inline-flex h-9 w-9 items-center justify-center rounded-full bg-white/90 text-red-600 shadow-sm transition duration-200 hover:bg-white hover:scale-110 active:scale-95 focus:outline-none focus:ring-2 focus:ring-primary-600">
              <svg class="h-5 w-5" fill="currentColor" viewBox="0 0 24 24"><path d="M11.645 20.91l-.007-.003-.022-.012a15.247 15.247 0 01-.383-.218 25.18 25.18 0 01-4.244-3.17C4.688 15.36 2.25 12.174 2.25 8.25 2.25 5.322 4.714 3 7.688 3A5.5 5.5 0 0112 5.052 5.5 5.5 0 0116.313 3c2.973 0 5.437 2.322 5.437 5.25 0 3.925-2.438 7.111-4.739 9.256a25.175 25.175 0 01-4.244 3.17 15.247 15.247 0 01-.383.219l-.022.012-.007.004-.003.001a.752.752 0 01-.704 0l-.003-.001z"/></svg>
            </button>
          </div>
          <div class="flex flex-1 flex-col p-3 md:p-4">
            <a href="product-details.html" class="block"><h3 class="line-clamp-2 text-sm font-medium text-gray-900 transition-colors duration-200 group-hover:text-primary-600 md:text-base">${p.name}</h3></a>
            <div class="mt-1.5 flex items-center gap-1"><div class="flex">${starsSvg(p.rating)}</div><span class="text-xs text-gray-400">(${p.reviews})</span></div>
            <div class="mt-2 flex items-center gap-2"><span class="text-base font-semibold text-primary-600 md:text-lg">${taka(p.price)}</span>${oldPrice}</div>
            <div class="mt-auto pt-3">${addBtn}</div>
          </div>
        </article>`;
    }

    function render() {
      const grid = document.getElementById('wishGrid');
      const empty = document.getElementById('wishEmpty');
      const header = document.getElementById('wishHeader');
      document.getElementById('wishItemCount').textContent = wishlist.length;
      document.getElementById('wishCount').textContent = wishlist.length;
      document.getElementById('cartCount').textContent = cartCount;

      if (wishlist.length === 0) {
        grid.innerHTML = ''; grid.classList.add('hidden'); header.classList.add('hidden'); empty.classList.remove('hidden');
        return;
      }
      grid.classList.remove('hidden'); header.classList.remove('hidden'); empty.classList.add('hidden');
      grid.innerHTML = wishlist.map((p, idx) => card(p, idx)).join('');
    }

    document.getElementById('wishGrid').addEventListener('click', (e) => {
      const btn = e.target.closest('[data-action]'); if (!btn) return;
      const idx = Number(btn.dataset.idx), action = btn.dataset.action;
      if (action === 'remove') { const n = wishlist[idx].name; wishlist.splice(idx, 1); showToast('Removed from wishlist: ' + n); render(); }
      else if (action === 'add') { cartCount++; showToast('Added to cart: ' + wishlist[idx].name); document.getElementById('cartCount').textContent = cartCount; }
    });

    document.getElementById('clearWishlist').addEventListener('click', () => { wishlist = []; showToast('Wishlist cleared'); render(); });
    document.getElementById('addAllToCart').addEventListener('click', () => {
      const inStock = wishlist.filter(p => p.inStock).length;
      if (inStock === 0) { showToast('No in-stock items to add'); return; }
      cartCount += inStock;
      document.getElementById('cartCount').textContent = cartCount;
      showToast(`Added ${inStock} item${inStock > 1 ? 's' : ''} to cart`);
    });

    const toast = document.getElementById('toast'); let toastTimer;
    function showToast(msg) {
      toast.textContent = msg; toast.classList.remove('opacity-0', 'translate-y-2'); toast.classList.add('opacity-100', 'translate-y-0');
      clearTimeout(toastTimer); toastTimer = setTimeout(() => { toast.classList.add('opacity-0', 'translate-y-2'); toast.classList.remove('opacity-100', 'translate-y-0'); }, 2500);
    }

    document.getElementById('year').textContent = new Date().getFullYear();
    render();
  </script>
</body>
</html>
